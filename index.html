<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aayushtronics AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root {
            --bg: #131314;
            --sidebar-bg: #0b0b0c;
            --surface: #1e1f20;
            --surface-hover: #333538;
            --text-primary: #e3e3e3;
            --text-secondary: #c4c7c5;
            --user-bubble: #1e1f20;
            --border: #2a2b2d;
            --accent: #3b6fe0;
            --accent-soft: #8ab4f8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* ---------------- SIDEBAR ---------------- */
        #sidebar {
            width: 268px;
            min-width: 268px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: margin-left 0.25s ease;
        }

        #sidebar.collapsed { margin-left: -268px; }

        #sidebar-header {
            padding: 18px 16px 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-logo { font-weight: 800; font-size: 1.05em; letter-spacing: -0.3px; color: #ffffff; white-space: nowrap; }
        .sidebar-logo .dot { color: var(--accent); }

        #new-chat-btn {
            margin: 8px 12px 14px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        #new-chat-btn:hover { background: var(--surface-hover); }

        #history-label {
            padding: 8px 20px 4px 20px;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #8a8d90;
        }

        #history-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }
        .history-item:hover { background: var(--surface); }
        .history-item.active { background: var(--surface-hover); color: var(--text-primary); }
        .history-item .del-btn { opacity: 0; font-size: 0.75rem; color: #9a9d9f; border: none; background: none; cursor: pointer; padding: 2px 4px; }
        .history-item:hover .del-btn { opacity: 1; }
        .history-item .del-btn:hover { color: #ff6b6b; }

        #user-box {
            border-top: 1px solid var(--border);
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            position: relative;
        }
        #user-box:hover { background: var(--surface); }

        #user-avatar {
            width: 30px; height: 30px; border-radius: 50%;
            background: var(--accent); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 0.85rem; flex-shrink: 0;
        }
        #user-name-label { font-size: 0.85rem; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #user-sub-label { font-size: 0.72rem; color: #8a8d90; }

        /* ---------------- MAIN CHAT ---------------- */
        #chat-container { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; min-width: 0; }

        #chat-header {
            padding: 18px 24px;
            font-size: 1.3em;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #sidebar-toggle-btn {
            background: transparent; border: none; color: var(--text-secondary);
            cursor: pointer; display: flex; align-items: center; padding: 6px; border-radius: 8px;
        }
        #sidebar-toggle-btn:hover { background: var(--surface); color: var(--text-primary); }

        .header-logo { color: #ffffff; font-weight: 800; }
        .header-logo .dot { color: var(--accent); }

        #chat-window {
            flex: 1;
            padding: 24px 24px 120px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
            scroll-behavior: smooth;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .message-wrapper { display: flex; width: 100%; animation: fadeIn 0.4s ease-out forwards; opacity: 0; }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
            from { opacity: 0; transform: translateY(10px); }
        }

        .user-wrapper { justify-content: flex-end; }

        .user-msg {
            background: var(--user-bubble);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 24px 24px 4px 24px;
            max-width: 80%;
            font-size: 1rem;
            line-height: 1.5;
        }

        .bot-wrapper { justify-content: flex-start; gap: 16px; }

        .bot-icon {
            width: 32px; height: 32px; min-width: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; background: #fff;
        }
        .bot-icon svg { width: 20px; height: 20px; }

        .bot-msg { color: var(--text-primary); max-width: 85%; font-size: 1rem; line-height: 1.6; padding-top: 4px; }
        .bot-msg p { margin: 0 0 0.6rem; }
        .bot-msg p:last-child { margin-bottom: 0; }

        /* Wiring / connections block */
        .kb-connections {
            margin-top: 0.7rem;
            padding: 0.8rem 1rem;
            border-radius: 14px;
            background: rgba(59, 111, 224, 0.08);
            border: 1px solid rgba(59, 111, 224, 0.25);
            font-size: 0.86rem;
        }
        .kb-connections strong {
            display: flex; align-items: center; gap: 0.4rem;
            color: var(--accent-soft); font-size: 0.78rem;
            text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.4rem;
        }
        .kb-connections ul { padding-left: 1.1rem; }
        .kb-connections li { color: var(--text-secondary); margin-bottom: 0.25rem; }

        /* Code block */
        .kb-code { margin-top: 0.7rem; border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .kb-code-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.5rem 0.9rem;
            background: rgba(255,255,255,0.04);
            font-size: 0.76rem;
            color: var(--text-secondary);
        }
        .kb-copy-btn {
            display: flex; align-items: center; gap: 0.35rem;
            font-size: 0.74rem;
            color: var(--accent-soft);
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
            border: 1px solid rgba(59,111,224,0.35);
            background: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .kb-copy-btn:hover { border-color: var(--accent-soft); }
        .kb-code pre { margin: 0; padding: 0.9rem 1rem; background: #0a0a0b; overflow-x: auto; font-size: 0.78rem; line-height: 1.6; }
        .kb-code code { font-family: 'Courier New', monospace; color: #cfe0ff; white-space: pre; }

        /* Code explanation block */
        .kb-explanation {
            margin-top: 0.7rem;
            padding: 0.8rem 1rem;
            border-radius: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            font-size: 0.86rem;
        }
        .kb-explanation strong {
            display: flex; align-items: center; gap: 0.4rem;
            color: var(--text-secondary); font-size: 0.78rem;
            text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.4rem;
        }
        .kb-explanation p { color: var(--text-secondary); line-height: 1.6; margin: 0; }

        .typing-dots span {
            display: inline-block; width: 6px; height: 6px; margin-right: 3px;
            border-radius: 50%; background: var(--text-secondary);
            animation: blink 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

        #input-area-wrapper {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 0 24px 20px 24px;
            background: linear-gradient(transparent, var(--bg) 40%);
        }

        #input-area-inner { max-width: 900px; margin: 0 auto; }

        #input-area {
            display: flex; align-items: center;
            background: var(--surface);
            border-radius: 32px;
            padding: 12px 16px 12px 24px;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: background 0.3s ease;
        }
        #input-area:focus-within { background: var(--surface-hover); }

        #user-input {
            flex: 1; background: transparent; color: var(--text-primary);
            border: none; outline: none; font-family: 'Inter', sans-serif; font-size: 1rem;
        }
        #user-input::placeholder { color: var(--text-secondary); }

        #send-btn {
            background: transparent; color: var(--text-secondary); border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            padding: 10px; border-radius: 50%; transition: color 0.2s, background 0.2s;
        }
        #send-btn:hover { background: rgba(255, 255, 255, 0.08); color: var(--text-primary); }

        #chat-window::-webkit-scrollbar { width: 8px; }
        #chat-window::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        #chat-window::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }
        #history-list::-webkit-scrollbar { width: 6px; }
        #history-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }

        /* ---------------- LOGIN MODAL ---------------- */
        #login-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.72);
            backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }

        #login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 32px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            animation: fadeIn 0.35s ease-out forwards;
        }

        #login-logo { font-weight: 800; font-size: 1.4em; color: #fff; margin-bottom: 6px; }
        #login-logo .dot { color: var(--accent); }
        #login-card p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 22px; }

        #login-input {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            color: var(--text-primary); padding: 12px 16px; border-radius: 12px;
            font-family: 'Inter', sans-serif; font-size: 0.95rem; outline: none; margin-bottom: 16px;
        }
        #login-input:focus { border-color: var(--accent); }

        #login-submit {
            width: 100%; background: var(--accent); color: #fff; border: none;
            padding: 12px; border-radius: 12px; font-family: 'Inter', sans-serif;
            font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: opacity 0.2s;
        }
        #login-submit:hover { opacity: 0.88; }

        @media (max-width: 760px) {
            #sidebar { position: fixed; z-index: 50; }
            #sidebar:not(.collapsed) { margin-left: 0; box-shadow: 8px 0 24px rgba(0,0,0,0.4); }
            #sidebar.collapsed { margin-left: -268px; }
        }
    </style>
</head>
<body>

    <!-- LOGIN / WELCOME MODAL -->
    <div id="login-overlay">
        <div id="login-card">
            <div id="login-logo">Aayushtronics<span class="dot">.</span></div>
            <p>Who's asking today? Tell me your name so I can tailor my answers to you.</p>
            <input type="text" id="login-input" placeholder="Enter your name" autocomplete="off">
            <button id="login-submit" onclick="submitLogin()">Continue</button>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <div id="sidebar-header">
            <div class="sidebar-logo">Aayushtronics<span class="dot">.</span></div>
        </div>
        <button id="new-chat-btn" onclick="startNewChat()">
            <span class="material-symbols-outlined" style="font-size:18px;">add</span>
            New chat
        </button>
        <div id="history-label">History</div>
        <div id="history-list"></div>
        <div id="user-box" onclick="promptRename()">
            <div id="user-avatar">A</div>
            <div>
                <div id="user-name-label">Guest</div>
                <div id="user-sub-label">Tap to change name</div>
            </div>
        </div>
    </div>

    <!-- MAIN CHAT -->
    <div id="chat-container">
        <div id="chat-header">
            <button id="sidebar-toggle-btn" onclick="toggleSidebar()" title="Toggle sidebar">
                <span class="material-symbols-outlined">menu</span>
            </button>
            <span class="header-logo">Aayushtronics<span class="dot">.</span></span>
        </div>

        <div id="chat-window"></div>

        <div id="input-area-wrapper">
            <div id="input-area-inner">
                <div id="input-area">
                    <input type="text" id="user-input" placeholder="Ask a hardware question..." onkeypress="handleKeyPress(event)" autocomplete="off">
                    <button id="send-btn" onclick="sendMessage()" title="Send message">
                        <span class="material-symbols-outlined">send</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ============================================================
           STATE
        ============================================================ */
        const STORAGE_KEYS = {
            NAME: 'aayushtronics_username',
            CHATS: 'aayushtronics_chats',
            ACTIVE: 'aayushtronics_active_chat'
        };

        let userName = localStorage.getItem(STORAGE_KEYS.NAME) || '';
        let chats = JSON.parse(localStorage.getItem(STORAGE_KEYS.CHATS) || '[]');
        let activeChatId = localStorage.getItem(STORAGE_KEYS.ACTIVE) || null;

        const BOT_ICON_SVG = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11.6601 23C11.5204 16.9247 6.64333 12.0476 0.567993 11.9079V11.0921C6.64333 10.9524 11.5204 6.0753 11.6601 0H12.4759C12.6156 6.0753 17.4927 10.9524 23.568 11.0921V11.9079C17.4927 12.0476 12.6156 16.9247 12.4759 23H11.6601Z" fill="#131314"/></svg>`;

        /* ============================================================
           INIT
        ============================================================ */
        window.onload = function () {
            if (userName) {
                document.getElementById('login-overlay').style.display = 'none';
                applyUserToSidebar();
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('login-input').focus();
            }

            document.getElementById('login-input').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') submitLogin();
            });

            renderHistoryList();

            if (activeChatId && chats.find(c => c.id === activeChatId)) {
                loadChat(activeChatId);
            } else if (chats.length > 0) {
                loadChat(chats[0].id);
            } else {
                startNewChat(true);
            }
        };

        function submitLogin() {
            const val = document.getElementById('login-input').value.trim();
            if (val === '') return;
            userName = val;
            localStorage.setItem(STORAGE_KEYS.NAME, userName);
            document.getElementById('login-overlay').style.display = 'none';
            applyUserToSidebar();

            const chat = getActiveChat();
            if (chat && chat.messages.length === 0) {
                appendBotMessage({
                    text: `Hey ${userName}! I'm your Aayushtronics electronics AI agent. Ask me about microcontrollers, components, sensors, protocols, or beginner circuit concepts — for basic components I'll include the wiring, the code, and an explanation of what the code does.`
                });
            }
        }

        function applyUserToSidebar() {
            document.getElementById('user-avatar').textContent = userName.charAt(0).toUpperCase();
            document.getElementById('user-name-label').textContent = userName;
            document.getElementById('user-sub-label').textContent = 'Tap to change name';
        }

        function promptRename() {
            const val = prompt('Update your name:', userName || '');
            if (val && val.trim() !== '') {
                userName = val.trim();
                localStorage.setItem(STORAGE_KEYS.NAME, userName);
                applyUserToSidebar();
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        /* ============================================================
           CHAT / HISTORY MANAGEMENT
        ============================================================ */
        function saveChats() {
            localStorage.setItem(STORAGE_KEYS.CHATS, JSON.stringify(chats));
            localStorage.setItem(STORAGE_KEYS.ACTIVE, activeChatId);
        }

        function getActiveChat() {
            return chats.find(c => c.id === activeChatId) || null;
        }

        function startNewChat(silent) {
            const id = 'chat_' + Date.now();
            const chat = { id: id, title: 'New chat', messages: [] };
            chats.unshift(chat);
            activeChatId = id;
            saveChats();
            renderHistoryList();
            renderChatWindow();

            if (!silent) {
                const greetName = userName ? `, ${userName}` : '';
                appendBotMessage({ text: `New session started${greetName}. What would you like to know?` });
            }
        }

        function loadChat(id) {
            activeChatId = id;
            saveChats();
            renderHistoryList();
            renderChatWindow();
        }

        function deleteChat(id, evt) {
            evt.stopPropagation();
            chats = chats.filter(c => c.id !== id);
            if (activeChatId === id) {
                if (chats.length > 0) {
                    activeChatId = chats[0].id;
                } else {
                    startNewChat(true);
                    return;
                }
            }
            saveChats();
            renderHistoryList();
            renderChatWindow();
        }

        function renderHistoryList() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            chats.forEach(chat => {
                const item = document.createElement('div');
                item.className = 'history-item' + (chat.id === activeChatId ? ' active' : '');
                item.onclick = () => loadChat(chat.id);

                const titleSpan = document.createElement('span');
                titleSpan.style.overflow = 'hidden';
                titleSpan.style.textOverflow = 'ellipsis';
                titleSpan.style.whiteSpace = 'nowrap';
                titleSpan.textContent = chat.title;

                const delBtn = document.createElement('button');
                delBtn.className = 'del-btn';
                delBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">close</span>';
                delBtn.onclick = (e) => deleteChat(chat.id, e);

                item.appendChild(titleSpan);
                item.appendChild(delBtn);
                list.appendChild(item);
            });
        }

        function renderChatWindow() {
            const chatWindow = document.getElementById('chat-window');
            chatWindow.innerHTML = '';
            const chat = getActiveChat();
            if (!chat) return;

            chat.messages.forEach(msg => {
                if (msg.role === 'user') {
                    renderUserBubble(msg.text);
                } else {
                    renderBotBubble(msg);
                }
            });
            scrollToBottom(chatWindow);
        }

        function setChatTitleFromFirstMessage(text) {
            const chat = getActiveChat();
            if (chat && chat.title === 'New chat') {
                chat.title = text.length > 32 ? text.slice(0, 32) + '…' : text;
                saveChats();
                renderHistoryList();
            }
        }

        /* ============================================================
           UI HELPERS
        ============================================================ */
        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }

        function sendMessage() {
            const inputField = document.getElementById('user-input');
            const messageText = inputField.value.trim();
            if (messageText === '') return;

            appendUserMessage(messageText);
            inputField.value = '';
            setChatTitleFromFirstMessage(messageText);

            showTypingIndicator();
            setTimeout(() => {
                removeTypingIndicator();
                const botReply = getBotResponse(messageText);
                appendBotMessage(botReply);
            }, 550 + Math.random() * 350);
        }

        function appendUserMessage(text) {
            const chat = getActiveChat();
            if (chat) chat.messages.push({ role: 'user', text: text });
            saveChats();
            renderUserBubble(text);
            scrollToBottom(document.getElementById('chat-window'));
        }

        // payload: { text, connections?, code?, codeExplanation? }
        function appendBotMessage(payload) {
            const chat = getActiveChat();
            if (chat) chat.messages.push({ role: 'bot', text: payload.text, connections: payload.connections, code: payload.code, codeExplanation: payload.codeExplanation });
            saveChats();
            renderBotBubble(payload);
            scrollToBottom(document.getElementById('chat-window'));
        }

        function renderUserBubble(text) {
            const chatWindow = document.getElementById('chat-window');
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper user-wrapper';
            const msgDiv = document.createElement('div');
            msgDiv.className = 'user-msg';
            msgDiv.textContent = text;
            wrapper.appendChild(msgDiv);
            chatWindow.appendChild(wrapper);
        }

        function escapeHtml(str) {
            return String(str).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
        }

        // Renders a bot message that may include a wiring "Connections" list and/or a copyable code block
        function renderBotBubble(msg) {
            const chatWindow = document.getElementById('chat-window');
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper bot-wrapper';

            const iconDiv = document.createElement('div');
            iconDiv.className = 'bot-icon';
            iconDiv.innerHTML = BOT_ICON_SVG;

            const msgDiv = document.createElement('div');
            msgDiv.className = 'bot-msg';
            let html = `<p>${escapeHtml(msg.text)}</p>`;

            if (msg.connections && msg.connections.length) {
                html += '<div class="kb-connections"><strong><span class="material-symbols-outlined" style="font-size:15px;">bolt</span>Connections</strong><ul>';
                msg.connections.forEach((c) => { html += `<li>${escapeHtml(c)}</li>`; });
                html += '</ul></div>';
            }

            let codeId = null;
            if (msg.code) {
                codeId = 'kbcode-' + Math.random().toString(36).slice(2);
                html += `<div class="kb-code">
                    <div class="kb-code-head">
                        <span>Copy-paste ready</span>
                        <button type="button" class="kb-copy-btn" data-target="${codeId}">
                            <span class="material-symbols-outlined" style="font-size:14px;">content_copy</span>Copy
                        </button>
                    </div>
                    <pre id="${codeId}"><code>${escapeHtml(msg.code)}</code></pre>
                </div>`;
            }

            if (msg.codeExplanation) {
                html += `<div class="kb-explanation"><strong><span class="material-symbols-outlined" style="font-size:15px;">info</span>How the code works</strong><p>${escapeHtml(msg.codeExplanation)}</p></div>`;
            }

            msgDiv.innerHTML = html;

        /* ============================================================
           MATCHING ENGINE
        ============================================================ */
        function normalize(text) {
            return ' ' + text.toLowerCase().replace(/[?.!,]/g, ' ').replace(/\s+/g, ' ').trim() + ' ';
        }

        function personalize(text) {
            const tag = userName ? ` ${userName}` : '';
            return text.replace(/\{name\}/g, tag);
        }

        function getBotResponse(rawInput) {
            const normalized = normalize(rawInput);
            let best = null;
            let bestScore = -1;

            for (const entry of KB) {
                for (const kw of entry.keywords) {
                    const kwNorm = kw.trim().toLowerCase();
                    if (normalized.includes(kwNorm)) {
                        if (kwNorm.length > bestScore) {
                            bestScore = kwNorm.length;
                            best = entry;
                        }
                    }
                }
            }

            if (best) {
                return { text: personalize(best.reply), connections: best.connections, code: best.code, codeExplanation: best.codeExplanation };
            }

            const fallback = [
                "I'm not picking up that signal. Could you specify the component, protocol, or circuit concept you need help with?",
                "That one's outside my current knowledge base — try asking about a specific component, sensor, or microcontroller.",
                "I couldn't match that to anything in my circuit library. Try a keyword like \"i2c\", \"esp32\", or \"blink led\"."
            ];
            return { text: personalize(fallback[Math.floor(Math.random() * fallback.length)]) };
        }
